<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кавовий Кабінет</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 15px; text-align: center; margin: 0; }
    .card { background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    .btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-coffee { background: #007bff; color: white; }
    .btn-pay { background: #28a745; color: white; }
    input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; text-align: center; }
  </style>
</head>
<body>
  <h2 id="user-greeting">👋 Завантаження...</h2>
  
  <div class="card">
    <h3>📊 Ваш баланс</h3>
    <p>Випито кави: <strong id="coffee-val">...</strong> грн</p>
    <p>Внесено коштів: <strong id="paid-val">...</strong> грн</p>
    <hr>
    <h3 id="status-val">Завантаження...</h3>
  </div>

  <button class="btn btn-coffee" onclick="addCoffee()">☕ +30 грн (Випив каву)</button>
  
  <div class="card">
    <input type="number" id="pay-amount" placeholder="Введіть суму (напр. 100)">
    <button class="btn btn-pay" onclick="addPayment()">💵 Внести оплату</button>
  </div>

  <script>
    // ВСТАВТЕ СЮДИ ВАШЕ ПОСИЛАННЯ З GOOGLE APPS SCRIPT (КРОК 1)
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMlctP1Af5tGnImfoEljpkc9achRutKzeFpfjVlhcZOlc7OH9Sl8MZ44xWOqQQt7qL6g/exec";

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : { id: "test_user", first_name: "Гість" };
    document.getElementById('user-greeting').innerText = '👋 ' + user.first_name;

    function updateDashboard(data) {
      document.getElementById('coffee-val').innerText = data.coffee;
      document.getElementById('paid-val').innerText = data.paid;
      const statusEl = document.getElementById('status-val');
      
      if (data.debt > 0) {
        statusEl.innerHTML = '<span style="color:red;">🔴 Борг: ' + data.debt + ' грн</span>';
      } else if (data.debt < 0) {
        statusEl.innerHTML = '<span style="color:green;">🟢 Переплата: ' + Math.abs(data.debt) + ' грн</span>';
      } else {
        statusEl.innerHTML = '🎉 Все оплачено!';
      }
    }

    function sendData(action, amount) {
      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: action,
          userId: user.id,
          userName: user.first_name + (user.last_name ? ' ' + user.last_name : ''),
          amount: amount
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) updateDashboard(data.balance);
      });
    }

    // Завантажуємо баланс
    sendData('get_balance', 0);

    function addCoffee() { sendData('add_coffee', 30); }
    function addPayment() {
      const val = document.getElementById('pay-amount').value;
      if (val && Number(val) > 0) {
        sendData('add_payment', val);
        document.getElementById('pay-amount').value = '';
      }
    }
  </script>
</body>
</html>
